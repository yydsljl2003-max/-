<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>贪吃蛇 3D</title>
<meta name="description" content="3D 贪吃蛇游戏 — 四种模式、道具系统、连击倍率">
<meta name="theme-color" content="#050515">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="贪吃蛇3D">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game3d"></div>

<div class="hud-top">
  <span class="hud-title">🐍 贪吃蛇 3D</span>
  <span class="hud-scores"><span>得分 <b id="score">0</b></span><span>最高分 <b id="highScore">0</b></span></span>
  <span class="hud-cam" id="camLabel">等距视角</span>
</div>

<div id="overlay" class="overlay">
  <div class="overlay-content">
    <h2 id="overlayTitle">🐍 贪吃蛇 3D</h2>
    <p id="overlayMessage">按方向键开始游戏</p>
    <button id="restartBtn" class="btn">开始游戏</button>
    <div class="overlay-hints"><span>WASD/方向键 移动</span><span>空格 暂停</span><span>V 切换视角</span></div>
  </div>
</div>

<div class="mobile-controls" id="mobileControls">
  <div class="arrow-row"><button class="arrow-btn" data-dir="up">↑</button></div>
  <div class="arrow-row">
    <button class="arrow-btn" data-dir="left">←</button>
    <button class="arrow-btn" data-dir="down">↓</button>
    <button class="arrow-btn" data-dir="right">→</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.137.0/build/three.min.js"></script>
<script src="core.js"></script>
<script src="state.js"></script>
<script src="audio.js"></script>
<script src="scene.js"></script>
<script src="hud.js"></script>
<script src="menu.js"></script>
<script src="settings.js"></script>
<script src="leaderboard.js"></script>
<script src="gamemodes.js"></script>
<script src="combo.js"></script>
<script src="powerups.js"></script>
<script src="input.js"></script>
<script src="game.js"></script>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(function() {});
}
</script>
</body>
</html>
